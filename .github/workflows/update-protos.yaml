name: Update protos

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-protos:
    name: Update protos
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Buf
        uses: cerbos/actions/install-tools@d2c46d81505b3c938d9eaa51af6d5ef4020cd4bf # main
        with:
          tools: buf

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby
        with:
          bundle-install: default protos

      - name: Update protos
        run: bin/rake protos

      - name: Generate code
        run: bin/rake generate

      - name: Create pull request
        uses: cerbos/actions/create-pull-request@d2c46d81505b3c938d9eaa51af6d5ef4020cd4bf # main
        with:
          client-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          branch: update-protos
          title: Update protos
          body: This PR updates protos and regenerates code.
          reviewers: haines
          add-paths: |-
            lib/cerbos/protobuf/**/*.rb
            proto/**/*.proto

      - name: Notify Slack on failure
        if: failure()
        uses: cerbos/actions/notify-slack@d2c46d81505b3c938d9eaa51af6d5ef4020cd4bf # main
        with:
          webhook-url: ${{ secrets.SLACK_CI_NOTIFICATIONS_WEBHOOK_URL }}
