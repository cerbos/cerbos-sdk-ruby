name: Update protos

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-protos:
    name: Update protos
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Buf
        uses: cerbos/actions/install-tools@4085936e609a7e3342762acbca5154c9f2df5b31
        with:
          tools: buf

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby
        with:
          bundle-install: default protos

      - name: Update protos
        run: bin/rake protos

      - name: Generate code
        run: bin/rake generate

      - name: Generate bot token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-protos
          delete-branch: true
          reviewers: haines
          signoff: true
          sign-commits: true
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          committer: ${{ vars.CERBOS_BOT_AUTHOR }}
          commit-message: |-
            Update protos
          title: |-
            Update protos
          body: |-
            This PR updates protos and regenerates code.
          add-paths: |-
            lib/cerbos/protobuf/**/*.rb
            proto/**/*.proto
