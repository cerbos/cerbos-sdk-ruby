name: Update protos

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

jobs:
  update-protos:
    name: Update protos
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@dffb23f65a78bba8db45d387d5ea1bbd6be3ef18 # v1.293.0
        with:
          bundler-cache: true

      - name: Update protos
        run: bin/rake protos

      - name: Generate code
        run: bin/rake generate

      - name: Generate bot token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-protos
          delete-branch: true
          reviewers: haines
          signoff: true
          sign-commits: true
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          committer: ${{ vars.CERBOS_BOT_AUTHOR }}
          commit-message: |-
            Update protos
          title: |-
            Update protos
          body: |-
            This PR updates protos and regenerates code.
          add-paths: |-
            lib/cerbos/protobuf/**/*.rb
            proto/**/*.proto
