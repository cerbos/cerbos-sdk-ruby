name: Update protos

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-protos:
    name: Update protos
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Buf
        uses: cerbos/actions/install-tools@f73c5fd3cd8b66cad9d757a8686cc30d0f209f84 # main
        with:
          tools: buf

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby
        with:
          bundle-install: default protos

      - name: Update protos
        run: bin/rake protos

      - name: Generate code
        run: bin/rake generate

      - name: Create pull request
        uses: cerbos/actions/create-pull-request@f73c5fd3cd8b66cad9d757a8686cc30d0f209f84 # main
        with:
          client-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          branch: update-protos
          title: Update protos
          body: This PR updates protos and regenerates code.
          reviewers: haines
          add-paths: |-
            lib/cerbos/protobuf/**/*.rb
            proto/**/*.proto

      - name: Notify Slack on failure
        if: failure()
        uses: cerbos/actions/notify-slack@f73c5fd3cd8b66cad9d757a8686cc30d0f209f84 # main
        with:
          webhook-url: ${{ secrets.SLACK_CI_NOTIFICATIONS_WEBHOOK_URL }}
